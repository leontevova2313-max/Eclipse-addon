name: Publish EclipseBeta

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Prepare EclipseBeta artifact
        run: |
          mkdir -p build/release
          cp build/libs/*.jar build/release/EclipseBeta.jar

      - name: Publish EclipseBeta release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: EclipseBeta
          name: EclipseBeta
          prerelease: true
          body: |
            Beta build of Eclipse Addon.

            Status:
            - Project is in beta.
            - Project was made 100% by AI according to user requirements and edits.
            - Development target: play.karasique.com.
            - Litematica printer is a reworked addon originally made by twilight.
          files: |
            ./build/release/EclipseBeta.jar
